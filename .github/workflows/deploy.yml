name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate static content
        run: |
          mkdir -p dist
          echo "<!DOCTYPE html>
<html>
<head>
    <title>Berlin Employee Analytics</title>
</head>
<body>
    <h1>Berlin Employee Analytics</h1>
    <p>This is a Python Streamlit application. Run it locally with: <code>streamlit run src/app.py</code></p>
    <p>GitHub Pages cannot directly host Python applications. Please run this locally or use a cloud service.</p>
</body>
</html>" > dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: "dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
